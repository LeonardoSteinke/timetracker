services:
  app:
    build: .
    container_name: ${PROJECT_NAME:-timetracker}
    restart: unless-stopped
    # Sem porta publicada: assume um proxy reverso na mesma rede Docker.
    # Para rodar isolado, troque este `expose` e o bloco `networks` abaixo por:
    #   ports:
    #     - "3000:3000"
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data  # SQLite persistente (timetracker.db)
    networks:
      - proxy_net

networks:
  # Rede externa onde vive o proxy reverso. Ajuste `name` para a sua, ou remova
  # este bloco (e o `networks` do serviço) se for publicar a porta direto.
  proxy_net:
    external: true
    name: ${PROXY_NETWORK:-media_server_media_net}
